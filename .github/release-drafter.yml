name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  # Changes
  $CHANGES
categories:
  - title: 'Breaking'
    label: 'breaking'
  - title: 'New'
    label: 'feature'
  - title: 'Bugfixes'
    label: 'bug'
  - title: 'Maintenance'
    label: 'maintenance'

# When graduating to 1.0.0, move 'breaking' from minor to a new major section
# so that breaking changes trigger major version bumps.
version-resolver:
  minor:
    labels:
      - 'breaking'
      - 'feature'
  patch:
    labels:
      - 'bug'
      - 'maintenance'
  default: patch

exclude-labels:
  - 'skip-changelog'
