// This API is currently EXPERIMENTAL and should be considered unstable. It may change at any point without notice.

syntax = "proto3";

package fredrik_og_louisa.product.v1alpha;

import "fredrik_og_louisa/decimal.proto";
import "fredrik_og_louisa/money.proto";
import "fredrik_og_louisa/time/date.proto";

service ProductService {
  rpc ListProducts(ListProductsRequest) returns (stream Product);
  rpc ListProductBalances(ListProductBalancesRequest) returns (stream ProductBalance);
}

message ListProductsRequest {}

message ListProductBalancesRequest {
  string warehouse_id = 1;
}

message Product {
  string sku = 1;
  string ean = 12;
  ProductStatus status = 16;
  string name = 2;
  Brand brand = 3;
  Money sales_price = 4;
  Decimal sales_vat_rate = 5;
  Money cost_price = 6;
  // Category hierarchy ordered from least to most specific
  repeated Category category_hierarchy = 7;
  // Deprecated: use variant.parent_sku instead. Will be removed in a future version.
  optional string parent_sku = 8 [deprecated = true];
  // Product variant data.
  // This field will be set if and only if this product is a variant.
  optional Variant variant = 18;
  // Net weight in grams
  Decimal net_weight_g = 9;
  // Gross weight in grams
  Decimal gross_weight_g = 10;
  // Volume in milliliters
  Decimal volume_ml = 11;
  string color_name = 17;

  string product_page_url = 13;
  string product_image_url = 14;
  string product_thumbnail_url = 15;
}

message Brand {
  string id = 1;
  string name = 2;
}

message Category {
  string id = 1;
  string name = 2;
}

message Variant {
  string parent_sku = 1;
  VariantKind kind = 2;
}

// This enum describes what kind of variant a product is, and tells you what field acts as the discriminator for
// the variant.
// For example, if a product is a color variant, you should read the color_name field to tell it apart from its
// siblings. The mapping is documented on each enum value.
enum VariantKind {
  VARIANT_KIND_UNSPECIFIED = 0;
  // Field: color_name
  VARIANT_KIND_COLOR = 1;
  // Field: volume_ml
  VARIANT_KIND_VOLUME = 2;
  // Field: net_weight_g
  VARIANT_KIND_WEIGHT = 3;
}

message ProductBalance {
  string sku = 1;
  sint32 on_hand = 2;
  sint32 allocated = 3;
  sint32 ordered_amount = 4;
  // Last date a procurement order was placed for this product
  optional time.Date last_ordered_date = 5;
  // Last date a procurement order was received for this product
  optional time.Date last_received_date = 6;
}

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  // Product data is prepared in advance of release.
  // Product is planned, but not yet ready to be stocked or sold.
  PRODUCT_STATUS_PRELIMINARY = 1;
  // Product is partially registered.
  // It contains the bare minimum of data necessary to be stocked and distributed internally, but registration is not
  // considered complete.
  PRODUCT_STATUS_PARTIAL = 2;
  // Product is fully registered and active.
  // It is released, stocked, and ready to be distributed and sold.
  PRODUCT_STATUS_ACTIVE = 3;
  // Product is being phased out of assortment.
  // It can still be sold until sold out, but will not be restocked.
  PRODUCT_STATUS_PHASE_OUT = 4;
  // Product has been discontinued.
  // It is no longer stocked and is no longer part of the assortment.
  // The product cannot be restocked or sold, though returns are still accepted.
  PRODUCT_STATUS_DISCONTINUED = 5;
  // The product has been archived and won't be updated or used for any business purpose going forward.
  // Returns are not accepted.
  // It is still available as a historical reference, but for most everyday purposes, it does not exist.
  PRODUCT_STATUS_ARCHIVED = 6;
  // SKU has changed. This product has been discontinued via an item number change, or due to a misregistration.
  // It only exists for historical reference.
  PRODUCT_STATUS_SKU_CHANGED = 7;
}